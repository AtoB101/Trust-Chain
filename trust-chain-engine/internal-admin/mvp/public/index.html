<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trust-Chain P0 Any Pair Paid API Demo</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; max-width: 960px; }
      h1 { margin-bottom: 8px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .col { flex: 1; min-width: 280px; }
      button { padding: 8px 12px; cursor: pointer; }
      pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow: auto; }
      .muted { color: #555; }
      .ok { color: #047857; font-weight: bold; }
      .bad { color: #b91c1c; font-weight: bold; }
      input { width: 100%; padding: 8px; margin-top: 6px; }
      code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>Trust-Chain P0 Demo: Any Pair Paid API</h1>
    <p class="muted">
      Goal: <b>one API call -> one on-chain settlement</b> (no free usage).
    </p>

    <div class="card">
      <div class="row">
        <div class="col">
          <label>User ID (for trace only)</label>
          <input id="userId" value="demo-user-01" />
        </div>
        <div class="col">
          <label>Symbol (exchange pair)</label>
          <input id="symbol" value="BTCUSDT" />
        </div>
      </div>
      <p>
        Price per call:
        <code id="priceEth">loading...</code>
      </p>
      <button id="callBtn">Call Price API and Auto-Settle</button>
      <p id="status" class="muted">idle</p>
    </div>

    <div class="card">
      <h3>Visualized flow</h3>
      <ol>
        <li>Before balance: <code id="beforeBal">-</code></li>
        <li>Agent/API call: <code id="priceResult">-</code></li>
        <li>Auto charge tx: <code id="txHash">-</code></li>
        <li>After balance: <code id="afterBal">-</code></li>
      </ol>
      <p>
        Explorer:
        <a id="explorerLink" href="#" target="_blank" rel="noopener noreferrer">-</a>
      </p>
    </div>

    <div class="card">
      <h3>Latest raw response</h3>
      <pre id="raw">-</pre>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const priceEthEl = document.getElementById("priceEth");
      const beforeBalEl = document.getElementById("beforeBal");
      const afterBalEl = document.getElementById("afterBal");
      const priceResultEl = document.getElementById("priceResult");
      const txHashEl = document.getElementById("txHash");
      const rawEl = document.getElementById("raw");
      const explorerLinkEl = document.getElementById("explorerLink");
      const userIdEl = document.getElementById("userId");
      const symbolEl = document.getElementById("symbol");
      const callBtn = document.getElementById("callBtn");

      async function init() {
        const res = await fetch("/api/config");
        const cfg = await res.json();
        priceEthEl.textContent = `${cfg.pricePerCallEth} ETH`;
      }

      function setStatus(msg, ok = null) {
        statusEl.textContent = msg;
        statusEl.className = ok === null ? "muted" : ok ? "ok" : "bad";
      }

      async function callApi() {
        setStatus("calling...");
        callBtn.disabled = true;
        try {
          const userId = (userIdEl.value || "demo-user-01").trim();
          const symbol = (symbolEl.value || "BTCUSDT").trim().toUpperCase();
          const resp = await fetch(`/api/price-paid?symbol=${encodeURIComponent(symbol)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId }),
          });
          const data = await resp.json();
          rawEl.textContent = JSON.stringify(data, null, 2);

          if (!resp.ok || !data.ok) {
            setStatus(data.error || "call failed", false);
            return;
          }

          beforeBalEl.textContent = `${data.settlement.beforeBalanceEth} ETH`;
          afterBalEl.textContent = `${data.settlement.afterBalanceEth} ETH`;
          priceResultEl.textContent = `${data.price.symbol} ${data.price.price}`;
          txHashEl.textContent = data.settlement.txHash;
          explorerLinkEl.textContent = data.settlement.explorerUrl;
          explorerLinkEl.href = data.settlement.explorerUrl;
          setStatus("completed: one call -> one settlement", true);
        } catch (err) {
          setStatus(String(err), false);
        } finally {
          callBtn.disabled = false;
        }
      }

      callBtn.addEventListener("click", callApi);
      init().catch((e) => setStatus(String(e), false));
    </script>
  </body>
</html>
