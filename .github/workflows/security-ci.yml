name: Security CI

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  security-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          forge install
          python3 -m pip install --upgrade pip
          python3 -m pip install slither-analyzer

      - name: Forge tests
        run: forge test -vv

      - name: Slither gate
        run: ./scripts/slither-gate.sh --format text

      - name: Release readiness gate
        run: ./scripts/release-readiness.sh
