name: Forge CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show tool versions
        run: |
          forge --version
          cast --version

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run fast unit/integration tests
        run: forge test -vv

      - name: Run invariant suite (NC)
        run: forge test --match-path "karma-core/contracts/test/NonCustodialAgentPayment.invariant.t.sol" -vv

      - name: Gas snapshot diff (fail on unexpected regression)
        run: forge snapshot --diff

      - name: Run proof/evidence CI gates (M4.1)
        run: ./scripts/ci-proof-gates.sh

  full-check:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run all tests
        run: forge test -vv

      - name: Run invariant suite (NC)
        run: forge test --match-path "karma-core/contracts/test/NonCustodialAgentPayment.invariant.t.sol" -vv

      - name: Gas snapshot diff
        run: forge snapshot --diff

      - name: Run proof/evidence CI gates (M4.1)
        run: ./scripts/ci-proof-gates.sh
