<!doctype html><html><head><meta charset='utf-8'><title>Create Service</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Seller Console / 创建收费服务</h2><nav><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/agent/confirm-call/'>Agent</a><a href='/seller/create-service/'>卖方建服务</a><a href='/seller/revenue/'>卖方收入</a></nav></header><main><div class='card'><h3>服务配置</h3><div class='grid'><div><label>服务名称</label><input id='name' value='Contract Risk Check API'></div><div><label>服务类型</label><select id='type'><option>数据查询</option><option>风险检测</option><option>链上监控</option><option>交易信号</option></select></div><div><label>API 地址</label><input id='endpoint' value='https://api.example.com/check'></div><div><label>请求方式</label><select id='method'><option>GET</option><option>POST</option></select></div><div><label>单次价格</label><input id='price' type='number' step='0.001' value='0.03'></div><div><label>结算资产</label><select id='token'><option>USDC</option><option>USDT</option></select></div></div><p><button class='primary' id='create'>创建服务</button> <button id='copy'>复制接入代码</button></p><pre id='code'>karma.wrapTool({ tool: api, price: "0.03", token: "USDC" })</pre></div></main><script>const s=tcUI.getState();create.onclick=()=>{const svc={id:'svc-'+Date.now(),name:name.value,price:Number(price.value||0),token:token.value,status:'active'};s.services.unshift(svc);tcUI.saveState(s);alert('服务已创建');};copy.onclick=()=>{const snippet=`karma.wrapTool({ tool: api, price: \"${price.value}\", token: \"${token.value}\" })`;code.textContent=snippet;navigator.clipboard?.writeText(snippet);alert('已复制');};</script></body></html>
