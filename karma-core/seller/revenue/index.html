<!doctype html><html><head><meta charset='utf-8'><title>Seller Revenue</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Seller Console / 收入记录</h2><nav><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/agent/confirm-call/'>Agent</a><a href='/seller/create-service/'>卖方建服务</a><a href='/seller/revenue/'>卖方收入</a></nav></header><main><div class='card'><h3>收入总览</h3><div id='kpi' class='grid'></div></div><div class='card'><h3>调用与收入记录</h3><table class='table'><thead><tr><th>时间</th><th>买方</th><th>服务</th><th>金额</th><th>状态</th></tr></thead><tbody id='rows'></tbody></table></div></main><script>const s=tcUI.getState();const total=s.revenue.reduce((a,b)=>a+b.amount,0);const today=total;const settled=s.revenue.filter(x=>x.status==='Settled').length;const disputed=s.revenue.filter(x=>x.status==='Disputed').length;kpi.innerHTML=[['今日收入',tcUI.fmt(today,s.buyer.token)],['本月收入',tcUI.fmt(total,s.buyer.token)],['成功账单',settled],['争议账单',disputed]].map(x=>`<div class='kpi'><div class='label'>${x[0]}</div><div class='value'>${x[1]}</div></div>`).join('');rows.innerHTML=s.revenue.map(r=>`<tr><td>${r.time}</td><td>${r.buyer}</td><td>${r.service}</td><td>${tcUI.fmt(r.amount,s.buyer.token)}</td><td>${r.status}</td></tr>`).join('');</script></body></html>
