<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Karma | Coming Soon</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: min(560px, 92vw);
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(2, 6, 23, 0.5);
    }
    .logo {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      background: #1d4ed8;
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.4px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #f8fafc;
    }
    p {
      margin: 0 0 18px;
      color: #94a3b8;
      line-height: 1.6;
    }
    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input[type="email"] {
      flex: 1 1 280px;
      min-width: 0;
      border: 1px solid #475569;
      background: #0b1220;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 12px 13px;
      font-size: 14px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="logo">KARMA</div>
    <h1>Coming soon. Join the waitlist</h1>
    <p>Trust-minimized payment rails for AI agents are launching soon.</p>
    <form action="mailto:haozi8868@qq.com" method="post" enctype="text/plain">
      <input type="email" name="email" required placeholder="you@company.com" />
      <button type="submit">Join waitlist</button>
    </form>
    <div class="note">For production, connect this form to your email provider API.</div>
  </section>
</body>
</html>
