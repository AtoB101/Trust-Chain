<!doctype html><html><head><meta charset='utf-8'><title>Buyer Authorize</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Buyer Console / 授权额度</h2><nav><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/agent/confirm-call/'>Agent</a><a href='/seller/create-service/'>卖方建服务</a><a href='/seller/revenue/'>卖方收入</a></nav></header><main><div class='card'><h3>钱包与额度总览</h3><div id='kpis' class='grid'></div></div><div class='card'><h3>授权额度管理</h3><div class='grid'><div><label>稳定币</label><select id='token'><option>USDC</option><option>USDT</option></select></div><div><label>授权额度</label><input id='allowance' type='number' step='0.01'></div><div><label>单次上限</label><input id='perCall' type='number' step='0.01'></div><div><label>每日上限</label><input id='daily' type='number' step='0.01'></div><div><label>自动确认阈值</label><input id='auto' type='number' step='0.01'></div></div><p><button class='primary' id='save'>保存授权规则</button> <button id='pause'>暂停 Agent 消费</button></p><p class='muted'>有未完成账单时，已占用额度不能解锁。</p></div></main><script>const s=tcUI.getState();const b=s.buyer;const k=[['钱包余额',tcUI.fmt(b.walletBalance,b.token)],['已授权额度',tcUI.fmt(b.allowance,b.token)],['锁定额度',tcUI.fmt(b.locked,b.token)],['可用额度',tcUI.fmt(b.active,b.token)],['待结算额度',tcUI.fmt(b.reserved,b.token)],['已结算',tcUI.fmt(b.settled,b.token)],['争议金额',tcUI.fmt(b.disputed,b.token)]];document.getElementById('kpis').innerHTML=k.map(x=>`<div class='kpi'><div class='label'>${x[0]}</div><div class='value'>${x[1]}</div></div>`).join('');token.value=b.token;allowance.value=b.allowance;perCall.value=b.perCallLimit;daily.value=b.dailyLimit;auto.value=b.autoConfirm;save.onclick=()=>{b.token=token.value;b.allowance=Number(allowance.value||0);b.perCallLimit=Number(perCall.value||0);b.dailyLimit=Number(daily.value||0);b.autoConfirm=Number(auto.value||0);tcUI.saveState(s);alert('已保存');location.reload();};pause.onclick=()=>alert('已暂停新调用（前端演示状态）');</script></body></html>
