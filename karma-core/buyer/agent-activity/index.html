<!doctype html><html><head><meta charset='utf-8'><title>Buyer Agent Activity</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Buyer / Agent 行为透明面板</h2><nav><a href='/buyer/dashboard/'>总览</a><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/buyer/agent-activity/'>Agent 行为</a><a href='/agent/confirm-call/'>调用确认</a></nav></header><main><div class='card'><h3>实时行为记录</h3><table class='table'><thead><tr><th>时间</th><th>Agent</th><th>服务</th><th>原因</th><th>价格</th><th>状态</th><th>操作</th></tr></thead><tbody id='rows'></tbody></table></div></main><script>const s=tcUI.getState();rows.innerHTML=s.calls.map(c=>`<tr><td>${c.time}</td><td>${c.agent}</td><td>${c.service}</td><td>${c.reason}</td><td>${tcUI.fmt(c.price,s.buyer.token)}</td><td>${c.status}</td><td><button onclick="alert('详情: '+${JSON.stringify('ok')})">查看详情</button> <button onclick="alert('已请求结算')">确认结算</button> <button onclick="alert('已发起争议')">发起争议</button></td></tr>`).join('') || `<tr><td colspan='7' class='muted'>暂无行为记录</td></tr>`;</script></body></html>
