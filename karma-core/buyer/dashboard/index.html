<!doctype html><html><head><meta charset='utf-8'><title>Buyer Dashboard</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Buyer Dashboard</h2><nav><a href='/buyer/dashboard/'>总览</a><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/buyer/agent-activity/'>Agent 行为</a><a href='/seller/dashboard/'>卖方总览</a></nav></header><main><div class='card'><h3>买方核心指标</h3><div id='kpi' class='grid'></div></div><div class='card'><h3>买方操作台（我现在要做什么）</h3><p><button id='buyerOneClick' class='primary'>买方一键授权</button> <a href='/agent/confirm-call/'><button>去确认调用</button></a> <a href='/buyer/bills/'><button>去看账单状态</button></a></p><ul class='checklist' id='buyerChecklist'></ul></div><div class='card'><h3>快捷操作</h3><p><a href='/buyer/authorize/'><button class='primary'>管理授权额度</button></a> <a href='/buyer/bills/'><button>查看账单</button></a> <a href='/agent/confirm-call/'><button>打开调用确认卡片</button></a></p></div></main><script>const s=tcUI.getState();const b=s.buyer;const items=[['钱包地址',b.wallet],['钱包余额',tcUI.fmt(b.walletBalance,b.token)],['可用额度',tcUI.fmt(b.active,b.token)],['待结算',tcUI.fmt(b.reserved,b.token)],['今日限额',tcUI.fmt(b.dailyLimit,b.token)],['单次上限',tcUI.fmt(b.perCallLimit,b.token)]];kpi.innerHTML=items.map(x=>`<div class='kpi'><div class='label'>${x[0]}</div><div class='value'>${x[1]}</div></div>`).join('');function renderChecklist(){const buyer=window.tcUI.getBuyerChecklist();document.getElementById('buyerChecklist').innerHTML=buyer.map(i=>`<li class='${i.done?'done':'todo'}'>${i.done?'✅':'⬜'} <a href='${i.href}'>${i.label}</a></li>`).join('')}document.getElementById('buyerOneClick').onclick=()=>{window.tcUI.ensureBuyerOneClickAuthorization();location.reload();};renderChecklist();</script></body></html>
