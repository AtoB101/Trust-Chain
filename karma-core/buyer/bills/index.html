<!doctype html><html><head><meta charset='utf-8'><title>Buyer Bills</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Buyer Console / 账单列表</h2><nav><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/agent/confirm-call/'>Agent</a><a href='/seller/create-service/'>卖方建服务</a><a href='/seller/revenue/'>卖方收入</a></nav></header><main><div class='card'><h3>账单状态</h3><table class='table'><thead><tr><th>账单ID</th><th>服务</th><th>卖方</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody id='rows'></tbody></table></div></main><script>const s=tcUI.getState();rows.innerHTML=s.bills.map(b=>`<tr><td>${b.id}</td><td>${b.service}</td><td>${b.seller}</td><td>${tcUI.fmt(b.amount,s.buyer.token)}</td><td><span class='pill ${String(b.status).toLowerCase()==='settled'?'settled':String(b.status).toLowerCase()==='disputed'?'disputed':'pending'}'>${b.status}</span></td><td><button onclick="alert('证据摘要: hash-demo-'+ '${b.id}')">查看证据</button> <button onclick="alert('结算确认已提交')">确认结算</button> <button onclick="alert('争议已创建')">发起争议</button></td></tr>`).join('');</script></body></html>
