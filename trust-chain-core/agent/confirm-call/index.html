<!doctype html><html><head><meta charset='utf-8'><title>Agent Confirm</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Agent 透明面板 / 调用确认</h2><nav><a href='/buyer/authorize/'>授权</a><a href='/buyer/bills/'>账单</a><a href='/agent/confirm-call/'>Agent</a><a href='/seller/create-service/'>卖方建服务</a><a href='/seller/revenue/'>卖方收入</a></nav></header><main><div class='card'><h3>调用前确认卡片</h3><div class='grid'><div><label>服务</label><input id='service' value='Any Pair Price API'></div><div><label>服务方</label><input id='seller' value='MarketDataBot'></div><div><label>调用原因</label><input id='reason' value='用户要求查询 ETHUSDT 实时价格'></div><div><label>价格</label><input id='price' type='number' step='0.001' value='0.03'></div></div><p class='muted'>你的可用额度：<span id='active'></span></p><p><button class='primary' id='allowOnce'>允许本次</button> <button id='deny'>拒绝</button> <button id='allowAlways'>总是允许该服务</button></p></div><div class='card'><h3>实时执行流</h3><ol id='flow'></ol></div><div class='card'><h3>调用后结果</h3><pre id='result'>等待调用...</pre></div></main><script>const s=tcUI.getState();active.textContent=tcUI.fmt(s.buyer.active,s.buyer.token);function renderFlow(done){const arr=['理解请求','选择服务','检查价格与额度','创建账单','调用服务','返回结果','结算'];flow.innerHTML=arr.map((x,i)=>`<li>${i<done?'✅':'⬜'} ${x}</li>`).join('')}renderFlow(0);allowOnce.onclick=()=>{renderFlow(7);const amount=Number(price.value||0);const bill={id:'BILL-'+Date.now(),service:service.value,seller:seller.value,amount,status:'Pending',createdAt:new Date().toISOString().slice(0,16).replace('T',' ')};s.bills.unshift(bill);s.calls.unshift({time:bill.createdAt,agent:'Trading Agent',service:service.value,reason:reason.value,price:amount,status:'Waiting settle'});s.buyer.reserved+=amount;s.buyer.active=Math.max(0,s.buyer.active-amount);tcUI.saveState(s);result.textContent=JSON.stringify({message:'Agent 调用完成，等待结算',billId:bill.id,amount,token:s.buyer.token,status:'Pending'},null,2)};deny.onclick=()=>{renderFlow(2);result.textContent=JSON.stringify({message:'已拒绝本次调用'},null,2)};allowAlways.onclick=()=>{alert('已加入服务白名单（前端演示）')};</script></body></html>
