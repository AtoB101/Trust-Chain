<!doctype html><html><head><meta charset='utf-8'><title>Seller Dashboard</title><link rel='stylesheet' href='../../ui-assets/style.css'><script src='../../ui-assets/app.js'></script></head><body><header><h2>Seller Dashboard</h2><nav><a href='/seller/dashboard/'>总览</a><a href='/seller/create-service/'>创建服务</a><a href='/seller/revenue/'>收入</a><a href='/buyer/dashboard/'>买方总览</a></nav></header><main><div class='card'><h3>作为卖方，你只做三步</h3><p><button id='sellerOneClick' class='primary'>一键部署收费服务</button> <a href='/seller/create-service/'><button>服务配置页</button></a> <a href='/seller/revenue/'><button>收入看板</button></a></p><ul class='checklist' id='sellerChecklist'></ul></div><div class='card'><h3>卖方核心指标</h3><div id='kpi' class='grid'></div></div><div class='card'><h3>服务列表</h3><table class='table'><thead><tr><th>服务ID</th><th>名称</th><th>价格</th><th>资产</th><th>状态</th></tr></thead><tbody id='rows'></tbody></table></div></main><script>const s=tcUI.getState();const rev=s.revenue||[];const calls=rev.length;const income=rev.reduce((a,b)=>a+b.amount,0);const success=rev.filter(x=>x.status==='Settled').length;const failed=rev.filter(x=>x.status==='Failed').length;const disputed=rev.filter(x=>x.status==='Disputed').length;const k=[['今日调用',calls],['今日收入',tcUI.fmt(income,s.buyer.token)],['成功账单',success],['失败账单',failed],['争议账单',disputed],['服务数量',s.services.length]];kpi.innerHTML=k.map(x=>`<div class='kpi'><div class='label'>${x[0]}</div><div class='value'>${x[1]}</div></div>`).join('');rows.innerHTML=s.services.map(v=>`<tr><td>${v.id}</td><td>${v.name}</td><td>${tcUI.fmt(v.price,v.token)}</td><td>${v.token}</td><td>${v.status}</td></tr>`).join('') || `<tr><td colspan='5' class='muted'>暂无服务</td></tr>`;function renderSellerChecklist(){const items=tcUI.getSellerChecklist();document.getElementById('sellerChecklist').innerHTML=items.map(i=>`<li class='${i.done?'done':'todo'}'>${i.done?'✅':'⬜'} <a href='${i.href}'>${i.label}</a></li>`).join('');}document.getElementById('sellerOneClick').onclick=()=>{tcUI.ensureSellerOneClickDeploy();location.reload();};renderSellerChecklist();</script></body></html>
