<!doctype html><html><head><meta charset='utf-8'><title>Trust-Chain Personal Center</title><link rel='stylesheet' href='./ui-assets/style.css'><script src='./ui-assets/app.js'></script></head><body><header><h2>Trust-Chain 个人中心总控台</h2><nav><a href='/index.html'>个人中心</a><a href='/buyer/bills/'>账单明细页</a><a href='/agent/confirm-call/'>Agent 调用确认</a></nav></header><main><div class='card'><div class='section-title'><h3>总览（同一用户可收款也可付款）</h3><div class='summary-line'><span class='badge' id='sumIncome'></span><span class='badge' id='sumExpense'></span><span class='badge' id='sumNet'></span><span class='badge' id='sumIssue'></span></div></div><p class='muted'>这里展示你的 Agent 卖了什么、收了多少钱；你的 Agent 买了什么、花了多少钱；哪些账单异常、哪些可立即付、哪些应累计后付。</p><p><button id='buyerOneClick' class='primary'>买方一键授权</button> <button id='sellerOneClick' class='primary'>卖方一键部署</button> <button id='resetDemo'>重置演示数据</button> <button id='startDemoScript'>开始演示脚本模式</button></p></div><div class='card'><h3>Agent 管理（添加/删减）</h3><div class='grid'><div><label>新增 Agent 名称</label><input id='newAgentName' placeholder='例如 AlphaTrader'></div><div><label>&nbsp;</label><button id='addAgent' class='primary'>添加 Agent</button></div></div><div id='agentList' class='agent-list'></div></div><div class='card'><h3>收款区（作为卖方）</h3><div id='incomeKpi' class='grid'></div><p><a href='/seller/create-service/'><button>管理服务与价格</button></a> <a href='/seller/revenue/'><button>查看收款明细页</button></a></p></div><div class='card'><h3>付款区（作为买方）</h3><div id='expenseKpi' class='grid'></div><p><a href='/buyer/authorize/'><button>调整授权规则</button></a> <a href='/buyer/agent-activity/'><button>查看 Agent 购买行为</button></a></p></div><div class='card'><h3>账单决策台（异常 / 立即付 / 累计后付）</h3><table class='table'><thead><tr><th>Bill</th><th>服务</th><th>金额</th><th>状态</th><th>策略</th><th>动作</th></tr></thead><tbody id='billRows'></tbody></table></div></main><script>
function downloadText(name,content){const blob=new Blob([content],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
document.getElementById('startDemoScript').onclick=()=>{window.tcUI.startDemoScript();};
document.getElementById('resetDemo').onclick=()=>{window.tcUI.resetDemoState();render();alert('演示数据已重置');};
document.getElementById('buyerOneClick').onclick=()=>{window.tcUI.ensureBuyerOneClickAuthorization();render();alert('买方一键授权已完成');};
document.getElementById('sellerOneClick').onclick=()=>{window.tcUI.ensureSellerOneClickDeploy();render();alert('卖方一键部署已完成');};
document.getElementById('addAgent').onclick=()=>{const name=(newAgentName.value||'').trim();if(!name){alert('请填写 Agent 名称');return;}window.tcUI.addMyAgent(name);newAgentName.value='';render();};
function setBillStrategy(id,strategy){const s=window.tcUI.getState();const bill=(s.bills||[]).find(x=>x.id===id);if(!bill)return;bill.payStrategy=strategy;window.tcUI.saveState(s);render();}
function settleBillNow(id){const s=window.tcUI.getState();const b=s.bills.find(x=>x.id===id);if(!b||b.status==='Settled')return;b.status='Settled';const amount=Number(b.amount||0);s.buyer.reserved=Math.max(0,Number(s.buyer.reserved||0)-amount);s.buyer.settled=Number(s.buyer.settled||0)+amount;s.revenue.unshift({time:new Date().toISOString().slice(0,16).replace('T',' '),buyer:s.buyer.wallet,service:b.service,amount,status:'Settled'});window.tcUI.saveState(s);render();}
function markBillIssue(id){const s=window.tcUI.getState();const b=s.bills.find(x=>x.id===id);if(!b)return;b.status='Disputed';s.buyer.disputed=Number(s.buyer.disputed||0)+Number(b.amount||0);window.tcUI.saveState(s);render();}
function removeAgent(id){window.tcUI.removeMyAgent(id);render();}
function render(){const s=window.tcUI.getState();const income=(s.revenue||[]).reduce((a,b)=>a+Number(b.amount||0),0);const expense=(s.bills||[]).filter(x=>x.status==='Settled').reduce((a,b)=>a+Number(b.amount||0),0);const issueCount=(s.bills||[]).filter(x=>x.status==='Disputed').length;sumIncome.textContent=`累计收款: ${window.tcUI.fmt(income,s.buyer.token)}`;sumExpense.textContent=`累计付款: ${window.tcUI.fmt(expense,s.buyer.token)}`;sumNet.textContent=`净收入: ${window.tcUI.fmt(income-expense,s.buyer.token)}`;sumIssue.textContent=`异常账单: ${issueCount}`;const nowPay=(s.bills||[]).filter(x=>x.status==='Pending'&&x.payStrategy==='now').reduce((a,b)=>a+Number(b.amount||0),0);const batchPay=(s.bills||[]).filter(x=>x.status==='Pending'&&x.payStrategy==='batch').reduce((a,b)=>a+Number(b.amount||0),0);incomeKpi.innerHTML=[['今日收款笔数',(s.revenue||[]).length],['累计收款',window.tcUI.fmt(income,s.buyer.token)],['已结算收款',(s.revenue||[]).filter(x=>x.status==='Settled').length],['争议收款',(s.revenue||[]).filter(x=>x.status==='Disputed').length]].map(x=>`<div class='kpi'><div class='label'>${x[0]}</div><div class='value'>${x[1]}</div></div>`).join('');expenseKpi.innerHTML=[['立即支付待处理',window.tcUI.fmt(nowPay,s.buyer.token)],['累计后付待处理',window.tcUI.fmt(batchPay,s.buyer.token)],['已结算付款',window.tcUI.fmt(expense,s.buyer.token)],['异常账单数',issueCount]].map(x=>`<div class='kpi'><div class='label'>${x[0]}</div><div class='value'>${x[1]}</div></div>`).join('');agentList.innerHTML=(s.myAgents||[]).map(a=>`<div class='agent-item'><div><strong>${a.name}</strong> <span class='muted'>${a.id}</span><div class='muted'>状态: ${a.status} | 服务数: ${a.services}</div></div><div><button onclick="removeAgent('${a.id}')">删除</button></div></div>`).join('')||"<p class='muted'>暂无 Agent</p>";billRows.innerHTML=(s.bills||[]).map(b=>`<tr><td>${b.id}</td><td>${b.service}</td><td>${window.tcUI.fmt(b.amount,s.buyer.token)}</td><td>${b.status}</td><td><select onchange="setBillStrategy('${b.id}',this.value)" ${b.status!=='Pending'?'disabled':''}><option value='now' ${b.payStrategy==='now'?'selected':''}>立即付</option><option value='batch' ${b.payStrategy==='batch'?'selected':''}>累计后付</option></select></td><td><button ${b.status!=='Pending'?'disabled':''} onclick="settleBillNow('${b.id}')">马上付</button> <button ${b.status==='Disputed'||b.status==='Settled'?'disabled':''} onclick="markBillIssue('${b.id}')">标记异常</button></td></tr>`).join('');}
render();
</script></body></html>
